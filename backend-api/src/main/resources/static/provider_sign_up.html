<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Sign Up</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <nav>
        <ul class="main-nav">
            <a href="provider_profile.html">Profile</a>
            <a href="provider_login.html">Login</a>
            <a href="provider_sign_up.html">Sign Up</a>
        </ul>

        <header>
            <a href="../browse.html">HomeFix Now</a>
        </header>
    </nav>

    <div class="provider-form">

        <h2>Create Provider Account</h2>

        <form id="providerForm">

            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required>

            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required>

            <label for="businessName">Business Name</label>
            <input type="text" id="businessName" name="businessName" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="specialty">Profession</label>

            <select id="specialty" name="specialty" required>
                <option value="">Select a profession</option>
                <option value="Electrical">Electrical</option>
                <option value="Plumbing">Plumbing</option>
                <option value="Roofing">Roofing</option>
                <option value="Masonry">Masonry</option>
            </select>


            </select>

            <label for="experience">Years of Experience</label>
            <input type="number" id="experience" name="experience" min="0" required>

            <label for="StartingRate">Starting Rate ($/hr)</label>
            <input type="number" id="StartingRate" name="StartingRate" min="0" step="0.01" required>

            <label for="location">Service Area</label>
            <input type="text" id="location" name="location" placeholder="Greensboro, NC" required>

            <label for="bio">About Me</label>
            <textarea id="bio" name="bio" placeholder="Tell customers about yourself and your services..."></textarea>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>

            <button type="submit">Create Provider Account</button>
        </form>
    </div>

    <script>
        document.getElementById("providerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const provider = {
                firstName: document.getElementById("firstName").value,
                lastName: document.getElementById("lastName").value,
                businessName: document.getElementById("businessName").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                specialty: document.getElementById("specialty").value,
                bio: document.getElementById("bio").value,
                location: document.getElementById("location").value
            };

            try {
                const response = await fetch("/api/providers", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(provider)
                });

                if (!response.ok) {
                    throw new Error("Failed to create provider.");
                }

                const createdProvider = await response.json();

                alert("Provider account created successfully!");

                // Save the logged-in provider ID
                sessionStorage.setItem("providerId", createdProvider.providerId);

                // Go to the profile page
                window.location.href = "provider_profile.html";
                
            } catch (error) {
                console.error(error);
                alert("Unable to create provider account.");
            }
        });
    </script>
</body>
